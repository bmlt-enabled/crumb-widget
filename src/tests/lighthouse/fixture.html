<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crumb Widget — Lighthouse fixture</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        background: #f3f4f6;
        font-family: system-ui, sans-serif;
      }
      #crumb-widget {
        height: 80vh;
        max-width: 1000px;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 class="sr-only" style="position: absolute; left: -9999px">BMLT Meeting Finder</h1>
      <div id="crumb-widget" data-server="/main_server/"></div>
    </main>
    <script>
      window.CrumbWidgetConfig = { geolocation: false, language: 'en' };
    </script>
    <script src="/dist/app.js"></script>
  </body>
</html>
