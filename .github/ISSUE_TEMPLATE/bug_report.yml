name: Bug Report
description: Something isn't working correctly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out as much as you can — it helps us fix things faster.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Embed the widget with config ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: input
    id: widget-version
    attributes:
      label: Widget version
      placeholder: e.g. 1.2.0 or the CDN URL you are using
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / OS
      placeholder: e.g. Chrome 125 on macOS 14
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Widget configuration (if relevant)
      description: Paste your `CrumbWidgetConfig` or the `data-*` attributes you are using.
      render: html

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, console errors, links to a live page, etc.
