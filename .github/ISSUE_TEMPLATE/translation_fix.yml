name: Translation Fix
description: Report or correct a translation in the widget, docs site, or README
labels: [translation]
body:
  - type: markdown
    attributes:
      value: |
        Most non-English strings were generated by an LLM and have not been reviewed by native speakers. Corrections from fluent speakers are very welcome — thank you for taking the time.

        If you'd rather send a PR directly, see the **Translations** section in [CONTRIBUTING.md](https://github.com/bmlt-enabled/crumb-widget/blob/main/.github/CONTRIBUTING.md#translations).

  - type: dropdown
    id: surface
    attributes:
      label: Where is the issue?
      options:
        - Widget UI (src/lang/{code}.ts)
        - Documentation site (docs/intl/{code}.json)
        - GitHub README (docs/intl/README.{code}.md)
        - Multiple / not sure
    validations:
      required: true

  - type: input
    id: language
    attributes:
      label: Language
      description: Language name and code (e.g. "Spanish (es)", "Brazilian Portuguese (pt-BR)").
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current text
      description: Paste the string as it currently appears, plus the key path or a screenshot if helpful.
      placeholder: |
        Key: noMeetingsFound
        Current: "No se encontraron reuniones"
    validations:
      required: true

  - type: textarea
    id: suggested
    attributes:
      label: Suggested correction
      description: What should it say instead?
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: Why is the current translation wrong?
      description: Grammar, regional preference, awkward phrasing, NA recovery context, etc.

  - type: checkboxes
    id: native
    attributes:
      label: Native / fluent speaker?
      options:
        - label: I speak this language natively or fluently
