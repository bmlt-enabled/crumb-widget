name: test

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    uses: ./.github/workflows/reusable-test.yml
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lighthouse:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout 🛒
        uses: actions/checkout@v6
      - name: node 24 ❇️
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - name: install dependencies 📦
        run: npm ci
      - name: build IIFE bundle 📦
        run: npm run build
      - name: run Lighthouse CI 🚦
        run: npx --yes @lhci/cli@0.15.x autorun
      - name: upload Lighthouse report 📋
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-report
          path: .lighthouseci/
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 7

  auto-merge-renovate:
    needs: [tests, lighthouse]
    if: github.actor == 'renovate[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Approve PR
        run: gh pr review ${{ github.event.pull_request.number }} --approve --repo ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR
        run: gh pr merge ${{ github.event.pull_request.number }} --merge --repo ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
