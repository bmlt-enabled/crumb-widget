<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test: Theme — Ocean — Crumb Widget</title>
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; background: #f8fafc; }
      .test-bar { background: #0e7490; color: #fff; padding: 10px 16px; font-size: 13px; display: flex; align-items: center; gap: 12px; }
      .test-bar a { color: rgba(255,255,255,0.75); text-decoration: none; }
      .test-bar a:hover { color: #fff; }
      .test-bar strong { color: #fff; }
      .test-bar code { background: rgba(0,0,0,0.2); padding: 2px 7px; border-radius: 4px; font-size: 12px; }

      #crumb-widget.bmlt-theme-ocean {
        --bmlt-accent: #0891b2; --bmlt-accent-light: #ecfeff;
        --bmlt-in-person: #0e7490; --bmlt-in-person-bg: #cffafe;
        --bmlt-virtual: #2563eb; --bmlt-virtual-bg: #dbeafe;
      }
    </style>
  </head>
  <body>
    <div class="test-bar">
      <a href="index.html">← Tests</a>
      <strong>Theme: Ocean</strong>
      <code>bmlt-theme-ocean</code>
    </div>

    <div id="crumb-widget"
      class="bmlt-theme-ocean"
      data-service-body="95,173"
      data-server="https://aggregator.bmltenabled.org/main_server/"
      data-path="/tests/theme-ocean.html"
    ></div>

    <script src="../app.js"></script>
  </body>
</html>
