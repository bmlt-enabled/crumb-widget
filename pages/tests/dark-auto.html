<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test: Dark Mode (auto) — Crumb Widget</title>
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; background: #f8fafc; }
      @media (prefers-color-scheme: dark) {
        body { background: #0f172a; }
        .test-bar { background: #0f172a !important; border-bottom: 1px solid #1e293b; }
        .test-bar code { background: #1e293b !important; }
      }
      .test-bar { background: #1e293b; color: #f1f5f9; padding: 10px 16px; font-size: 13px; display: flex; align-items: center; gap: 12px; }
      .test-bar a { color: #94a3b8; text-decoration: none; }
      .test-bar a:hover { color: #f1f5f9; }
      .test-bar strong { color: #fff; }
      .test-bar code { background: #334155; padding: 2px 7px; border-radius: 4px; font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="test-bar">
      <a href="index.html">← Tests</a>
      <strong>Dark Mode (auto)</strong>
      <code>darkMode: 'auto'</code> — follows OS preference
    </div>

    <div id="crumb-widget" data-service-body="95,173" data-server="https://aggregator.bmltenabled.org/main_server/" data-path="/tests/dark-auto.html"></div>

    <script>
      var CrumbWidgetConfig = {
        darkMode: 'auto'
      };
    </script>
    <script src="../app.js"></script>
  </body>
</html>
