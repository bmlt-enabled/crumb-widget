<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test: Geolocation — Crumb Widget</title>
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; background: #f8fafc; }
      .test-bar { background: #1e293b; color: #f1f5f9; padding: 10px 16px; font-size: 13px; display: flex; align-items: center; gap: 12px; }
      .test-bar a { color: #94a3b8; text-decoration: none; }
      .test-bar a:hover { color: #f1f5f9; }
      .test-bar strong { color: #fff; }
      .test-bar code { background: #334155; padding: 2px 7px; border-radius: 4px; font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="test-bar">
      <a href="index.html">← Tests</a>
      <strong>Geolocation</strong>
      <code>geolocation: true</code> — Near Me button, geolocates on load
    </div>

    <!-- Uses aggregator which supports geo search -->
    <div id="crumb-widget" data-server="https://aggregator.bmltenabled.org/main_server/" data-path="/tests/geolocation.html"></div>

    <script>
      var CrumbWidgetConfig = {
        geolocation: true,
        geolocationRadius: 50,
        columns: ['time', 'name', 'location', 'address', 'service_body']
      };
    </script>
    <script src="../app.js"></script>
  </body>
</html>
