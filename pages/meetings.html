<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMLT Meeting Finder</title>
    <style>
      body { margin: 0; background: #ffffff; }
      body.dark { background: #0f172a; }
      body.dark #bmlt-meeting-list {
        --bmlt-background: #1e293b; --bmlt-text: #f1f5f9; --bmlt-border: #334155;
        --bmlt-accent: #60a5fa; --bmlt-accent-light: #1e3a5f; --bmlt-row-alt: #243044;
        --bmlt-in-person: #86efac; --bmlt-in-person-bg: #14532d;
        --bmlt-virtual: #93c5fd; --bmlt-virtual-bg: #1e3a5f;
        --bmlt-surface: #1e293b; --bmlt-hover: #2d4060; --bmlt-divider: #334155;
        --bmlt-text-secondary: #94a3b8; --bmlt-text-muted: #64748b;
      }
      #theme-btn { position:fixed; top:6px; right:120px; z-index:9999; background:none; border:none; cursor:pointer; font-size:22px; padding:4px 6px; opacity:0.85; }
      #theme-btn:hover { opacity:1; }
    </style>
  </head>
  <body>
    <!--
      Embed the meeting finder by:
      1. Adding this div with your BMLT root server URL
      2. Optionally filter by service body IDs with data-service-body="123" or data-service-body="1,2,3"
      3. Loading the app.js script
    -->
    <div
      id="bmlt-meeting-list"
      data-root-server="https://aggregator.bmltenabled.org/main_server/"
    ></div>
    <script>
      var _t = atob('cGsuZXlKMUlqb2ljR3BoZFdScGIyMTJJaXdpWVNJNkltTnJOSGczTjJwdmVqQjNOWGd6YW04NU5UWTBkbWh6WlRNaWZRLmRpaC1XTDJEbm1odDdmalZWUlBwMWc=');
      var BmltUiConfig = {
        geolocation: true,
        geolocationRadius: 75,
        map: {
          tiles: {
            attribution: `Map data &copy; <a href="https://www.openstreetmap.org/">OpenStreetMap</a>, Imagery © <a href="https://www.mapbox.com/">Mapbox</a>`,
            url: 'https://api.mapbox.com/styles/v1/mapbox/streets-v11/tiles/{z}/{x}/{y}?access_token=' + _t,
          },
          tiles_dark: {
            attribution: `Map data &copy; <a href="https://www.openstreetmap.org/">OpenStreetMap</a>, Imagery © <a href="https://www.mapbox.com/">Mapbox</a>`,
            url: 'https://api.mapbox.com/styles/v1/mapbox/dark-v10/tiles/{z}/{x}/{y}?access_token=' + _t,
          },
        },
      };
    </script>
    <script src="./app.js"></script>
    <button id="theme-btn" onclick="var d=!document.body.classList.contains('dark');document.body.classList.toggle('dark',d);document.body.classList.toggle('light',!d);localStorage.setItem('theme',d?'dark':'light');this.textContent=d?'☀️':'🌙'">🌙</button>
    <script>var _d=localStorage.getItem('theme')==='dark'||(!localStorage.getItem('theme')&&matchMedia('(prefers-color-scheme:dark)').matches);document.body.classList.add(_d?'dark':'light');if(_d)document.getElementById('theme-btn').textContent='☀️'</script>
  </body>
</html>
